<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="CSS/styles.css" />
    <title>The Floor is Lava — приключения Пушистика</title>

</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="1024" height="640"></canvas>
    
    <div class="game-stats" id="gameUI">
        <div class="stat">
            <span class="stat-label">●</span>
            <span class="stat-value" id="coinCounter">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">◆</span>
            <span class="stat-value" id="distanceCounter">0</span>
        </div>
    </div>

    <div id="mainMenu" class="overlay">
        <div class="modal">
            <h1>MINIMAL RUN</h1>
            <div class="leaderboard">
                <h3>BEST</h3>
                <ol id="leaderboardList"></ol>
            </div>
            <input type="text" id="playerNameInput" placeholder="name" maxlength="14">
            <button id="startGameBtn">START</button>
        </div>
    </div>

    <div id="gameOverlay" class="overlay hidden">
        <div class="modal gameover-card">
            <p>◆ GAME OVER ◆</p>
            <div class="final-numbers">
                <div><span id="finalDistance">0</span><br><span style="font-size:0.7rem; color:#666">DIST</span></div>
                <div><span id="finalCoins">0</span><br><span style="font-size:0.7rem; color:#666">COIN</span></div>
            </div>
            <div class="flex-btns">
                <button id="restartBtnGameOver">RETRY</button>
                <button id="exitToMenuBtn">MENU</button>
            </div>
        </div>
    </div>
</div>

<script src="JS/JavaScript.js"></script>
</body>
</html>
